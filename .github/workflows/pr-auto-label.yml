name: PR Auto Label

on:
  pull_request:
    types: [opened]

jobs:
  label:
    name: Add skip-release label
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add skip-release label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['skip-release']
              });
            } catch (error) {
              core.warning(`Could not add skip-release label: ${error.message}`);
            }
