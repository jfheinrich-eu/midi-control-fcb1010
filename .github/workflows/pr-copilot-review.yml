name: Copilot PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  copilot-review:
    name: Request Copilot code review
    runs-on: ubuntu-latest
    # Skip draft pull requests — Copilot review is only useful on ready PRs
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@60a0d83039f74b59c328d781e62d1b2160834302 # v7.0.1
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['github-copilot']
              });
            } catch (error) {
              core.warning(`Could not request Copilot review: ${error.message}`);
            }
