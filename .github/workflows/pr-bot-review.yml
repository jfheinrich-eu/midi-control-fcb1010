name: Bot PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

jobs:
  bot-review:
    name: jfheinrich-bot approves owner PRs
    runs-on: ubuntu-latest
    permissions: {}
    # Only run for non-draft PRs authored by @jfheinrich
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'jfheinrich'
    steps:
      - name: Submit approving review as jfheinrich-bot
        uses: actions/github-script@60a0d83039f74b59c328d781e62d1b2160834302 # v7.0.1
        with:
          # BOT_REVIEW_TOKEN must be a PAT or GitHub App token for the
          # jfheinrich-bot account with pull-requests:write access.
          github-token: ${{ secrets.BOT_REVIEW_TOKEN }}
          script: |
            // Skip if jfheinrich-bot has already submitted an APPROVE review
            // to avoid duplicate reviews on every synchronize event.
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const alreadyApproved = reviews.data.some(
              r => r.user.login === 'jfheinrich-bot' && r.state === 'APPROVED'
            );
            if (alreadyApproved) {
              core.info('jfheinrich-bot has already approved this PR — skipping.');
              return;
            }
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Automated codeowner approval by jfheinrich-bot.'
            });
