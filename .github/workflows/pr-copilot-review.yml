name: Copilot PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  copilot-review:
    name: Request Copilot code review
    runs-on: ubuntu-latest
    # Skip draft pull requests — Copilot review is only useful on ready PRs
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['github-copilot']
              });
            } catch (error) {
              core.warning(`Could not request Copilot review: ${error.message}`);
            }
