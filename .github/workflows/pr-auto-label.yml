name: PR Auto Label

on:
  pull_request:
    types: [opened]

jobs:
  label:
    name: Add skip-release label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add skip-release label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['skip-release']
            });
